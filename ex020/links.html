<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        a{
            text-decoration: none;
            color: red;
            font-weight: bold;
        }

        a:visited{
            color: darkred;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: yellow;
        }

    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/AlexandreNNahirniak" target="_blank" rel="external">GitHub</a></li>
        <li><a href="https://www.instagram.com/alexandrenahirniak/" target="_blank" rel="external">Instagram</a></li>
        <li><a href="https://www.linkedin.com/in/alexandre-das-neves-nahirniak-953a3b249/" target="_blank" rel="external">LinkedIn</a></li>
    </ul>
</body>
</html>
