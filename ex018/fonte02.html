<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
        <style>
        @font-face{
            font-family: 'Valentine Rose';
            src: url('fontes/Valentine Rose.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        h1{
            font-family: 'Valentine Rose', Arial, sans-serif;
            font-size: 2em;
            font-weight: normal;
        }
   
/*
tipos de format()
- opentype (otf)
- truetype (ttf)
- embedded-opentype
- truetype-att (apple advanced typography)
- svg
*/
    </style>
</head>
<body>
<h1>Treino com fonte externa</h1>
<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ducimus molestias vero soluta recusandae, nihil adipisci nesciunt. Itaque veniam obcaecati repellat eum. Ipsam, inventore atque omnis quos autem iste libero in.</p>
</body>
</html>
